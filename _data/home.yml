    url: https://github.com/bl-sdk/unrealsdk
    desc: Python bindings and embedded interpreter for unrealsdk.

  - title: Borderlands Python Mod Managers
    url: https://github.com/bl-sdk/
    desc: Several mod managers and in-game mod menus, across whole Borderlands series.

  - title: Live Object Explorer
    url: https://https://github.com/apple1417/live_object_explorer
    desc: Unreal reverse engineering tool, showing object properties in live, interactive, menus.

